<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" width="800" height="500">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0c1018"/>
      <stop offset="100%" style="stop-color:#0a1520"/>
    </linearGradient>
    <linearGradient id="goldGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#d4af37"/>
      <stop offset="100%" style="stop-color:#b8860b"/>
    </linearGradient>
    <linearGradient id="blueGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1e40af"/>
      <stop offset="100%" style="stop-color:#1d4ed8"/>
    </linearGradient>
    <linearGradient id="cardGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#111827"/>
      <stop offset="100%" style="stop-color:#0f172a"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="8" result="coloredBlur"/>
      <feMerge><feMergeNode in="coloredBlur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="800" height="500" fill="url(#bgGrad)"/>

  <!-- Ambient glow -->
  <ellipse cx="120" cy="150" rx="180" ry="130" fill="rgba(212,175,55,0.06)" filter="url(#glow)"/>
  <ellipse cx="680" cy="380" rx="150" ry="120" fill="rgba(30,64,175,0.08)" filter="url(#glow)"/>

  <!-- Navigation -->
  <rect x="0" y="0" width="800" height="56" fill="rgba(8,12,20,0.97)"/>
  <rect x="0" y="56" width="800" height="1" fill="rgba(212,175,55,0.4)"/>

  <!-- Logo -->
  <rect x="20" y="16" width="3" height="24" rx="1.5" fill="url(#goldGrad)"/>
  <text x="30" y="29" font-family="Georgia,serif" font-size="13" font-weight="bold" fill="white">ITALIA</text>
  <text x="30" y="44" font-family="Georgia,serif" font-size="10" fill="url(#goldGrad)" letter-spacing="2">CONSTRUCTION</text>

  <!-- Nav links -->
  <text x="490" y="33" font-family="Arial,sans-serif" font-size="10.5" fill="rgba(255,255,255,0.55)">Accueil</text>
  <text x="543" y="33" font-family="Arial,sans-serif" font-size="10.5" fill="rgba(255,255,255,0.55)">Services</text>
  <text x="603" y="33" font-family="Arial,sans-serif" font-size="10.5" fill="rgba(255,255,255,0.55)">Projets</text>
  <text x="652" y="33" font-family="Arial,sans-serif" font-size="10.5" fill="rgba(255,255,255,0.55)">À Propos</text>
  <text x="716" y="33" font-family="Arial,sans-serif" font-size="10.5" fill="rgba(255,255,255,0.55)">Contact</text>

  <!-- Hero banner -->
  <rect x="0" y="56" width="800" height="200" fill="rgba(15,23,42,0.8)"/>
  <!-- Building silhouettes background -->
  <rect x="580" y="90" width="80" height="166" fill="rgba(30,64,175,0.12)" rx="2"/>
  <rect x="640" y="110" width="60" height="146" fill="rgba(30,64,175,0.10)" rx="2"/>
  <rect x="690" y="80" width="110" height="176" fill="rgba(30,64,175,0.08)" rx="2"/>
  <!-- Windows on buildings -->
  <rect x="592" y="100" width="10" height="14" rx="1" fill="rgba(212,175,55,0.15)"/>
  <rect x="610" y="100" width="10" height="14" rx="1" fill="rgba(212,175,55,0.1)"/>
  <rect x="592" y="122" width="10" height="14" rx="1" fill="rgba(212,175,55,0.2)"/>
  <rect x="610" y="122" width="10" height="14" rx="1" fill="rgba(212,175,55,0.08)"/>
  <rect x="700" y="96" width="10" height="14" rx="1" fill="rgba(212,175,55,0.12)"/>
  <rect x="718" y="96" width="10" height="14" rx="1" fill="rgba(212,175,55,0.18)"/>
  <rect x="736" y="96" width="10" height="14" rx="1" fill="rgba(212,175,55,0.1)"/>

  <!-- Hero text -->
  <text x="50" y="108" font-family="Georgia,serif" font-size="10" fill="rgba(212,175,55,0.8)" letter-spacing="3">EXCELLENCE EN CONSTRUCTION</text>
  <rect x="50" y="114" width="40" height="1" fill="url(#goldGrad)" opacity="0.6"/>
  <text x="50" y="148" font-family="Georgia,serif" font-size="26" font-weight="bold" fill="white">Bâtir l'Excellence,</text>
  <text x="50" y="178" font-family="Georgia,serif" font-size="26" font-weight="bold" fill="url(#goldGrad)">Livrer la Qualité</text>
  <text x="50" y="205" font-family="Arial,sans-serif" font-size="10.5" fill="rgba(255,255,255,0.4)">Construction, rénovation et gestion de projets BTP</text>
  <text x="50" y="220" font-family="Arial,sans-serif" font-size="10.5" fill="rgba(255,255,255,0.4)">en Côte d'Ivoire depuis 2019</text>

  <!-- CTA Buttons -->
  <rect x="50" y="232" width="130" height="34" rx="17" fill="url(#goldGrad)"/>
  <text x="115" y="253" font-family="Arial,sans-serif" font-size="10" font-weight="bold" fill="#0c1018" text-anchor="middle">Nos Réalisations</text>
  <rect x="192" y="232" width="115" height="34" rx="17" fill="transparent" stroke="rgba(212,175,55,0.5)" stroke-width="1.5"/>
  <text x="249.5" y="253" font-family="Arial,sans-serif" font-size="10" fill="rgba(255,255,255,0.8)" text-anchor="middle">Demander un Devis</text>

  <!-- Services section -->
  <rect x="0" y="270" width="800" height="40" fill="rgba(30,64,175,0.08)"/>
  <text x="400" y="295" font-family="Georgia,serif" font-size="13" font-weight="bold" fill="white" text-anchor="middle">Nos Services</text>
  <rect x="360" y="300" width="80" height="1" fill="url(#goldGrad)" opacity="0.5"/>

  <!-- Service cards -->
  <rect x="30" y="318" width="165" height="155" rx="10" fill="url(#cardGrad)" stroke="rgba(212,175,55,0.2)" stroke-width="1"/>
  <rect x="30" y="318" width="165" height="2" rx="1" fill="url(#goldGrad)"/>
  <text x="113" y="355" font-family="Arial,sans-serif" font-size="24" text-anchor="middle" fill="rgba(212,175,55,0.5)">🏗️</text>
  <text x="113" y="382" font-family="Arial,sans-serif" font-size="10" font-weight="bold" fill="white" text-anchor="middle">Construction</text>
  <text x="113" y="396" font-family="Arial,sans-serif" font-size="8.5" fill="rgba(255,255,255,0.35)" text-anchor="middle">Neuve</text>
  <text x="40" y="420" font-family="Arial,sans-serif" font-size="8" fill="rgba(255,255,255,0.3)">Villas, immeubles, entrepôts</text>
  <text x="40" y="434" font-family="Arial,sans-serif" font-size="8" fill="rgba(255,255,255,0.3)">et bâtiments commerciaux</text>
  <text x="40" y="454" font-family="Arial,sans-serif" font-size="9" fill="rgba(212,175,55,0.7)" font-weight="bold">+ En savoir plus →</text>

  <rect x="207" y="318" width="165" height="155" rx="10" fill="url(#cardGrad)" stroke="rgba(212,175,55,0.3)" stroke-width="1.5"/>
  <rect x="207" y="318" width="165" height="2" rx="1" fill="url(#goldGrad)"/>
  <text x="290" y="355" font-family="Arial,sans-serif" font-size="24" text-anchor="middle" fill="rgba(212,175,55,0.5)">🔨</text>
  <text x="290" y="382" font-family="Arial,sans-serif" font-size="10" font-weight="bold" fill="white" text-anchor="middle">Rénovation</text>
  <text x="290" y="396" font-family="Arial,sans-serif" font-size="8.5" fill="rgba(255,255,255,0.35)" text-anchor="middle">&amp; Réhabilitation</text>
  <text x="217" y="420" font-family="Arial,sans-serif" font-size="8" fill="rgba(255,255,255,0.3)">Transformation complète</text>
  <text x="217" y="434" font-family="Arial,sans-serif" font-size="8" fill="rgba(255,255,255,0.3)">et mise aux normes</text>
  <text x="217" y="454" font-family="Arial,sans-serif" font-size="9" fill="rgba(212,175,55,0.7)" font-weight="bold">+ En savoir plus →</text>

  <rect x="384" y="318" width="165" height="155" rx="10" fill="url(#cardGrad)" stroke="rgba(212,175,55,0.2)" stroke-width="1"/>
  <rect x="384" y="318" width="165" height="2" rx="1" fill="url(#goldGrad)"/>
  <text x="467" y="355" font-family="Arial,sans-serif" font-size="24" text-anchor="middle" fill="rgba(212,175,55,0.5)">📐</text>
  <text x="467" y="382" font-family="Arial,sans-serif" font-size="10" font-weight="bold" fill="white" text-anchor="middle">Architecture</text>
  <text x="467" y="396" font-family="Arial,sans-serif" font-size="8.5" fill="rgba(255,255,255,0.35)" text-anchor="middle">&amp; Design</text>
  <text x="394" y="420" font-family="Arial,sans-serif" font-size="8" fill="rgba(255,255,255,0.3)">Plans, études de faisabilité</text>
  <text x="394" y="434" font-family="Arial,sans-serif" font-size="8" fill="rgba(255,255,255,0.3)">et suivi de chantier</text>
  <text x="394" y="454" font-family="Arial,sans-serif" font-size="9" fill="rgba(212,175,55,0.7)" font-weight="bold">+ En savoir plus →</text>

  <!-- Stats card -->
  <rect x="561" y="318" width="209" height="155" rx="10" fill="url(#cardGrad)" stroke="rgba(212,175,55,0.2)" stroke-width="1"/>
  <rect x="561" y="318" width="209" height="2" rx="1" fill="url(#goldGrad)"/>
  <text x="571" y="346" font-family="Arial,sans-serif" font-size="9" fill="rgba(255,255,255,0.35)" letter-spacing="1">CHIFFRES CLÉS</text>
  <text x="571" y="374" font-family="Georgia,serif" font-size="26" font-weight="bold" fill="url(#goldGrad)">50+</text>
  <text x="571" y="390" font-family="Arial,sans-serif" font-size="9" fill="rgba(255,255,255,0.35)">Projets réalisés</text>
  <rect x="571" y="400" width="185" height="1" fill="rgba(255,255,255,0.05)"/>
  <text x="571" y="422" font-family="Georgia,serif" font-size="22" font-weight="bold" fill="white">15+</text>
  <text x="571" y="437" font-family="Arial,sans-serif" font-size="9" fill="rgba(255,255,255,0.35)">Années d'expérience</text>
  <text x="571" y="462" font-family="Arial,sans-serif" font-size="8" fill="rgba(255,255,255,0.2)">PHP · MySQL · HTML/CSS</text>

  <!-- Bottom accent -->
  <rect x="0" y="496" width="800" height="4" fill="url(#goldGrad)"/>
</svg>
