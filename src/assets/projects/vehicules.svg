<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" width="800" height="500">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0a0a0f"/>
      <stop offset="100%" style="stop-color:#12080e"/>
    </linearGradient>
    <linearGradient id="redGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#dc2626"/>
      <stop offset="100%" style="stop-color:#991b1b"/>
    </linearGradient>
    <linearGradient id="heroGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:rgba(220,38,38,0.15)"/>
      <stop offset="100%" style="stop-color:transparent"/>
    </linearGradient>
    <linearGradient id="carGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#1c1c2e"/>
      <stop offset="100%" style="stop-color:#0d0d1a"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="10" result="coloredBlur"/>
      <feMerge><feMergeNode in="coloredBlur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="redGlow">
      <feGaussianBlur stdDeviation="5" result="coloredBlur"/>
      <feMerge><feMergeNode in="coloredBlur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="800" height="500" fill="url(#bgGrad)"/>

  <!-- Ambient red glow -->
  <ellipse cx="150" cy="200" rx="200" ry="150" fill="rgba(220,38,38,0.07)" filter="url(#glow)"/>
  <ellipse cx="700" cy="350" rx="150" ry="120" fill="rgba(220,38,38,0.05)" filter="url(#glow)"/>

  <!-- Navigation -->
  <rect x="0" y="0" width="800" height="56" fill="rgba(5,5,8,0.95)"/>
  <rect x="0" y="56" width="800" height="1" fill="rgba(220,38,38,0.4)"/>

  <!-- Logo -->
  <rect x="20" y="16" width="4" height="24" rx="2" fill="url(#redGrad)"/>
  <text x="32" y="33" font-family="Arial,sans-serif" font-size="16" font-weight="bold" fill="white">CARSERV</text>
  <text x="110" y="33" font-family="Arial,sans-serif" font-size="9" fill="rgba(220,38,38,0.8)">AUTO</text>

  <!-- Nav links -->
  <text x="520" y="33" font-family="Arial,sans-serif" font-size="11" fill="rgba(255,255,255,0.6)">Accueil</text>
  <text x="578" y="33" font-family="Arial,sans-serif" font-size="11" fill="rgba(255,255,255,0.6)">Véhicules</text>
  <text x="650" y="33" font-family="Arial,sans-serif" font-size="11" fill="rgba(255,255,255,0.6)">Services</text>
  <text x="716" y="33" font-family="Arial,sans-serif" font-size="11" fill="rgba(255,255,255,0.6)">Contact</text>

  <!-- Hero section background -->
  <rect x="0" y="56" width="800" height="220" fill="url(#heroGrad)"/>

  <!-- Hero text -->
  <text x="50" y="110" font-family="Arial,sans-serif" font-size="11" font-weight="bold" fill="rgba(220,38,38,0.9)" letter-spacing="3">VENTE &amp; SERVICES AUTO</text>
  <text x="50" y="148" font-family="Arial,sans-serif" font-size="30" font-weight="bold" fill="white">Qualified Car</text>
  <text x="50" y="182" font-family="Arial,sans-serif" font-size="30" font-weight="bold" fill="url(#redGrad)">Repair Service</text>
  <text x="50" y="215" font-family="Arial,sans-serif" font-size="30" font-weight="bold" fill="white">Center</text>
  <text x="50" y="245" font-family="Arial,sans-serif" font-size="11" fill="rgba(255,255,255,0.45)" style="max-width:300px">Trouvez votre véhicule idéal parmi notre large sélection</text>

  <!-- CTA Buttons -->
  <rect x="50" y="258" width="130" height="36" rx="18" fill="url(#redGrad)" filter="url(#redGlow)"/>
  <text x="115" y="280.5" font-family="Arial,sans-serif" font-size="11" font-weight="bold" fill="white" text-anchor="middle">Voir les véhicules</text>
  <rect x="192" y="258" width="110" height="36" rx="18" fill="transparent" stroke="rgba(220,38,38,0.6)" stroke-width="1.5"/>
  <text x="247" y="280.5" font-family="Arial,sans-serif" font-size="11" fill="rgba(255,255,255,0.8)" text-anchor="middle">Nous contacter</text>

  <!-- Car silhouette (abstract) -->
  <!-- Car body -->
  <g transform="translate(430, 95)" opacity="0.9">
    <!-- Car shadow/glow -->
    <ellipse cx="175" cy="168" rx="160" ry="12" fill="rgba(220,38,38,0.2)" filter="url(#glow)"/>
    <!-- Chassis -->
    <path d="M30,130 L30,110 L80,80 L200,70 L280,80 L330,110 L330,130 L310,140 L50,140 Z" fill="#1a1a2e" stroke="rgba(220,38,38,0.3)" stroke-width="1"/>
    <!-- Roof -->
    <path d="M90,110 L110,82 L220,78 L260,110 Z" fill="#0f0f1e" stroke="rgba(255,255,255,0.1)" stroke-width="1"/>
    <!-- Windows -->
    <path d="M98,108 L115,86 L185,83 L185,108 Z" fill="rgba(100,150,255,0.15)" stroke="rgba(255,255,255,0.05)" stroke-width="0.5"/>
    <path d="M192,83 L225,83 L252,108 L192,108 Z" fill="rgba(100,150,255,0.15)" stroke="rgba(255,255,255,0.05)" stroke-width="0.5"/>
    <!-- Wheels -->
    <circle cx="80" cy="140" r="24" fill="#111" stroke="rgba(220,38,38,0.5)" stroke-width="2"/>
    <circle cx="80" cy="140" r="14" fill="#1a1a1a" stroke="rgba(255,255,255,0.1)" stroke-width="1"/>
    <circle cx="80" cy="140" r="5" fill="rgba(220,38,38,0.7)"/>
    <circle cx="278" cy="140" r="24" fill="#111" stroke="rgba(220,38,38,0.5)" stroke-width="2"/>
    <circle cx="278" cy="140" r="14" fill="#1a1a1a" stroke="rgba(255,255,255,0.1)" stroke-width="1"/>
    <circle cx="278" cy="140" r="5" fill="rgba(220,38,38,0.7)"/>
    <!-- Headlight -->
    <ellipse cx="325" cy="108" rx="10" ry="6" fill="rgba(255,230,100,0.7)" filter="url(#glow)"/>
    <!-- Red accent line -->
    <rect x="30" y="122" width="300" height="2" rx="1" fill="url(#redGrad)" opacity="0.7"/>
  </g>

  <!-- Vehicle listing cards -->
  <rect x="30" y="310" width="220" height="155" rx="12" fill="rgba(18,18,24,0.9)" stroke="rgba(220,38,38,0.25)" stroke-width="1"/>
  <rect x="30" y="310" width="220" height="3" rx="2" fill="url(#redGrad)"/>
  <!-- Card image area -->
  <rect x="40" y="322" width="200" height="80" rx="8" fill="rgba(30,30,46,0.9)"/>
  <text x="140" y="368" font-family="Arial,sans-serif" font-size="28" text-anchor="middle" fill="rgba(220,38,38,0.3)">🚗</text>
  <text x="40" y="422" font-family="Arial,sans-serif" font-size="11" font-weight="bold" fill="white">Toyota Camry 2023</text>
  <text x="40" y="438" font-family="Arial,sans-serif" font-size="9" fill="rgba(255,255,255,0.4)">Berline • 45 000 km • Automatique</text>
  <text x="40" y="455" font-family="Arial,sans-serif" font-size="13" font-weight="bold" fill="url(#redGrad)">18 500 000 FCFA</text>

  <rect x="270" y="310" width="220" height="155" rx="12" fill="rgba(18,18,24,0.9)" stroke="rgba(220,38,38,0.4)" stroke-width="1.5"/>
  <rect x="270" y="310" width="220" height="3" rx="2" fill="url(#redGrad)"/>
  <rect x="280" y="322" width="200" height="80" rx="8" fill="rgba(30,30,46,0.9)"/>
  <text x="380" y="368" font-family="Arial,sans-serif" font-size="28" text-anchor="middle" fill="rgba(220,38,38,0.4)">🚙</text>
  <!-- Featured badge -->
  <rect x="360" y="326" width="60" height="16" rx="8" fill="rgba(220,38,38,0.8)"/>
  <text x="390" y="337.5" font-family="Arial,sans-serif" font-size="8" font-weight="bold" fill="white" text-anchor="middle">VEDETTE</text>
  <text x="280" y="422" font-family="Arial,sans-serif" font-size="11" font-weight="bold" fill="white">BMW X5 2022</text>
  <text x="280" y="438" font-family="Arial,sans-serif" font-size="9" fill="rgba(255,255,255,0.4)">SUV • 28 000 km • Automatique</text>
  <text x="280" y="455" font-family="Arial,sans-serif" font-size="13" font-weight="bold" fill="url(#redGrad)">42 000 000 FCFA</text>

  <rect x="510" y="310" width="260" height="155" rx="12" fill="rgba(18,18,24,0.9)" stroke="rgba(220,38,38,0.25)" stroke-width="1"/>
  <rect x="510" y="310" width="260" height="3" rx="2" fill="url(#redGrad)"/>
  <!-- Stats card -->
  <text x="530" y="340" font-family="Arial,sans-serif" font-size="10" fill="rgba(255,255,255,0.4)">STATISTIQUES</text>
  <text x="530" y="370" font-family="Arial,sans-serif" font-size="28" font-weight="bold" fill="white">124</text>
  <text x="530" y="386" font-family="Arial,sans-serif" font-size="9" fill="rgba(255,255,255,0.35)">Véhicules disponibles</text>
  <rect x="530" y="398" width="220" height="1" fill="rgba(255,255,255,0.05)"/>
  <text x="530" y="420" font-family="Arial,sans-serif" font-size="22" font-weight="bold" fill="rgba(220,38,38,0.9)">98%</text>
  <text x="530" y="436" font-family="Arial,sans-serif" font-size="9" fill="rgba(255,255,255,0.35)">Clients satisfaits</text>
  <text x="530" y="456" font-family="Arial,sans-serif" font-size="9" fill="rgba(255,255,255,0.25)">Django • Bootstrap • PostgreSQL</text>

  <!-- Bottom accent line -->
  <rect x="0" y="496" width="800" height="4" fill="url(#redGrad)"/>
</svg>
