<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" width="800" height="500">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f0628"/>
      <stop offset="100%" style="stop-color:#1a0a3e"/>
    </linearGradient>
    <linearGradient id="purpleGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#7c3aed"/>
      <stop offset="100%" style="stop-color:#4f46e5"/>
    </linearGradient>
    <linearGradient id="cardGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1e1145"/>
      <stop offset="100%" style="stop-color:#170e38"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="8" result="coloredBlur"/>
      <feMerge><feMergeNode in="coloredBlur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="softGlow">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge><feMergeNode in="coloredBlur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="800" height="500" fill="url(#bgGrad)"/>

  <!-- Ambient glow top -->
  <ellipse cx="200" cy="80" rx="180" ry="100" fill="rgba(124,58,237,0.15)" filter="url(#glow)"/>
  <ellipse cx="600" cy="420" rx="160" ry="90" fill="rgba(79,70,229,0.12)" filter="url(#glow)"/>

  <!-- Nav bar -->
  <rect x="0" y="0" width="800" height="52" fill="rgba(15,6,40,0.9)"/>
  <rect x="0" y="52" width="800" height="1" fill="rgba(124,58,237,0.3)"/>

  <!-- Logo text -->
  <circle cx="28" cy="26" r="12" fill="url(#purpleGrad)"/>
  <text x="28" y="30.5" font-family="Arial,sans-serif" font-size="11" font-weight="bold" fill="white" text-anchor="middle">M</text>
  <text x="48" y="30" font-family="Arial,sans-serif" font-size="13" font-weight="bold" fill="white">MailNotifier</text>

  <!-- Nav links -->
  <text x="550" y="30" font-family="Arial,sans-serif" font-size="11" fill="rgba(255,255,255,0.5)">Dashboard</text>
  <text x="630" y="30" font-family="Arial,sans-serif" font-size="11" fill="rgba(255,255,255,0.5)">Channels</text>
  <text x="710" y="30" font-family="Arial,sans-serif" font-size="11" fill="rgba(255,255,255,0.5)">Settings</text>

  <!-- Hero title -->
  <text x="400" y="115" font-family="Arial,sans-serif" font-size="28" font-weight="bold" fill="white" text-anchor="middle">Notification</text>
  <text x="400" y="148" font-family="Arial,sans-serif" font-size="28" font-weight="bold" fill="url(#purpleGrad)" text-anchor="middle">Email Management</text>
  <text x="400" y="178" font-family="Arial,sans-serif" font-size="12" fill="rgba(255,255,255,0.5)" text-anchor="middle">Recevez vos emails sur Telegram &amp; WhatsApp en temps réel</text>

  <!-- CTA Button -->
  <rect x="315" y="192" width="170" height="36" rx="18" fill="url(#purpleGrad)" filter="url(#softGlow)"/>
  <text x="400" y="215" font-family="Arial,sans-serif" font-size="12" font-weight="bold" fill="white" text-anchor="middle">Commencer maintenant</text>

  <!-- Notification cards row -->
  <!-- Card 1 - Telegram -->
  <rect x="40" y="258" width="220" height="110" rx="14" fill="url(#cardGrad)" stroke="rgba(124,58,237,0.4)" stroke-width="1"/>
  <rect x="40" y="258" width="220" height="3" rx="2" fill="url(#purpleGrad)"/>

  <!-- Telegram icon circle -->
  <circle cx="66" cy="290" r="14" fill="#229ED9"/>
  <text x="66" y="294.5" font-family="Arial,sans-serif" font-size="11" fill="white" text-anchor="middle" font-weight="bold">✈</text>

  <text x="88" y="284" font-family="Arial,sans-serif" font-size="11" font-weight="bold" fill="white">Telegram</text>
  <text x="88" y="297" font-family="Arial,sans-serif" font-size="9" fill="rgba(255,255,255,0.5)">Notification reçue · 2 min</text>

  <text x="55" y="320" font-family="Arial,sans-serif" font-size="9" fill="rgba(255,255,255,0.7)">📧 Nouveau mail de: client@example.com</text>
  <text x="55" y="336" font-family="Arial,sans-serif" font-size="9" fill="rgba(255,255,255,0.4)">Sujet: Demande de devis urgent</text>
  <rect x="55" y="346" width="80" height="14" rx="7" fill="rgba(124,58,237,0.3)" stroke="rgba(124,58,237,0.5)" stroke-width="1"/>
  <text x="95" y="356.5" font-family="Arial,sans-serif" font-size="8" fill="#a78bfa" text-anchor="middle">Voir le mail</text>

  <!-- Card 2 - WhatsApp (bigger/featured) -->
  <rect x="284" y="250" width="240" height="128" rx="14" fill="url(#cardGrad)" stroke="rgba(124,58,237,0.6)" stroke-width="1.5"/>
  <rect x="284" y="250" width="240" height="3" rx="2" fill="url(#purpleGrad)"/>
  <!-- Pulse ring -->
  <circle cx="404" cy="314" r="60" fill="none" stroke="rgba(124,58,237,0.1)" stroke-width="1"/>
  <circle cx="404" cy="314" r="48" fill="none" stroke="rgba(124,58,237,0.15)" stroke-width="1"/>

  <circle cx="310" cy="278" r="14" fill="#25D366"/>
  <text x="310" y="282.5" font-family="Arial,sans-serif" font-size="11" fill="white" text-anchor="middle" font-weight="bold">W</text>

  <text x="332" y="272" font-family="Arial,sans-serif" font-size="11" font-weight="bold" fill="white">WhatsApp</text>
  <text x="332" y="285" font-family="Arial,sans-serif" font-size="9" fill="rgba(255,255,255,0.5)">En cours de développement</text>

  <rect x="298" y="298" width="180" height="1" fill="rgba(255,255,255,0.07)"/>
  <text x="404" y="318" font-family="Arial,sans-serif" font-size="9" fill="rgba(255,255,255,0.4)" text-anchor="middle">Intégration WhatsApp Business API</text>
  <text x="404" y="332" font-family="Arial,sans-serif" font-size="9" fill="rgba(255,255,255,0.3)" text-anchor="middle">Bientôt disponible</text>
  <rect x="334" y="342" width="120" height="22" rx="11" fill="rgba(37,211,102,0.15)" stroke="rgba(37,211,102,0.3)" stroke-width="1"/>
  <text x="394" y="356.5" font-family="Arial,sans-serif" font-size="8" fill="#25D366" text-anchor="middle">Voir la démo</text>

  <!-- Card 3 - Stats -->
  <rect x="548" y="258" width="212" height="110" rx="14" fill="url(#cardGrad)" stroke="rgba(124,58,237,0.4)" stroke-width="1"/>
  <rect x="548" y="258" width="212" height="3" rx="2" fill="url(#purpleGrad)"/>

  <text x="568" y="282" font-family="Arial,sans-serif" font-size="10" fill="rgba(255,255,255,0.5)">STATISTIQUES</text>

  <text x="568" y="308" font-family="Arial,sans-serif" font-size="26" font-weight="bold" fill="white">247</text>
  <text x="568" y="322" font-family="Arial,sans-serif" font-size="9" fill="rgba(255,255,255,0.4)">Mails notifiés ce mois</text>

  <!-- Mini bar chart -->
  <rect x="568" y="348" width="12" height="12" rx="2" fill="rgba(124,58,237,0.6)"/>
  <rect x="584" y="344" width="12" height="16" rx="2" fill="rgba(124,58,237,0.7)"/>
  <rect x="600" y="338" width="12" height="22" rx="2" fill="url(#purpleGrad)"/>
  <rect x="616" y="340" width="12" height="20" rx="2" fill="url(#purpleGrad)"/>
  <rect x="632" y="332" width="12" height="28" rx="2" fill="url(#purpleGrad)" filter="url(#softGlow)"/>
  <rect x="648" y="336" width="12" height="24" rx="2" fill="rgba(124,58,237,0.8)"/>
  <rect x="664" y="334" width="12" height="26" rx="2" fill="url(#purpleGrad)"/>
  <rect x="680" y="330" width="12" height="30" rx="2" fill="url(#purpleGrad)" filter="url(#softGlow)"/>
  <rect x="696" y="338" width="12" height="22" rx="2" fill="rgba(124,58,237,0.7)"/>
  <text x="740" y="348" font-family="Arial,sans-serif" font-size="9" fill="#a78bfa">+12%</text>

  <!-- Tech stack badges -->
  <text x="40" y="398" font-family="Arial,sans-serif" font-size="9" fill="rgba(255,255,255,0.35)">STACK TECHNIQUE</text>
  <rect x="40" y="406" width="65" height="20" rx="10" fill="rgba(124,58,237,0.2)" stroke="rgba(124,58,237,0.4)" stroke-width="1"/>
  <text x="72.5" y="419.5" font-family="Arial,sans-serif" font-size="9" fill="#a78bfa" text-anchor="middle">Python</text>
  <rect x="113" y="406" width="75" height="20" rx="10" fill="rgba(124,58,237,0.2)" stroke="rgba(124,58,237,0.4)" stroke-width="1"/>
  <text x="150.5" y="419.5" font-family="Arial,sans-serif" font-size="9" fill="#a78bfa" text-anchor="middle">FastAPI</text>
  <rect x="196" y="406" width="78" height="20" rx="10" fill="rgba(124,58,237,0.2)" stroke="rgba(124,58,237,0.4)" stroke-width="1"/>
  <text x="235" y="419.5" font-family="Arial,sans-serif" font-size="9" fill="#a78bfa" text-anchor="middle">Telegram API</text>
  <rect x="282" y="406" width="72" height="20" rx="10" fill="rgba(124,58,237,0.2)" stroke="rgba(124,58,237,0.4)" stroke-width="1"/>
  <text x="318" y="419.5" font-family="Arial,sans-serif" font-size="9" fill="#a78bfa" text-anchor="middle">Vercel</text>
  <rect x="362" y="406" width="72" height="20" rx="10" fill="rgba(124,58,237,0.2)" stroke="rgba(124,58,237,0.4)" stroke-width="1"/>
  <text x="398" y="419.5" font-family="Arial,sans-serif" font-size="9" fill="#a78bfa" text-anchor="middle">Angular</text>

  <!-- Live badge -->
  <rect x="660" y="406" width="100" height="22" rx="11" fill="rgba(124,58,237,0.25)" stroke="rgba(124,58,237,0.5)" stroke-width="1"/>
  <circle cx="674" cy="417" r="3.5" fill="#a78bfa"/>
  <text x="720" y="420.5" font-family="Arial,sans-serif" font-size="9" font-weight="bold" fill="#a78bfa" text-anchor="middle">LIVE EN PROD</text>

  <!-- Bottom accent line -->
  <rect x="0" y="496" width="800" height="4" fill="url(#purpleGrad)"/>
</svg>
