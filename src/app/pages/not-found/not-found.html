<div class="not-found">
  <div class="not-found-bg"></div>
  <div class="not-found-content">
    <div class="error-code">
      <span>4</span><span class="zero">0</span><span>4</span>
    </div>
    <h1 class="error-title">{{ T.notFound.subtitle }}</h1>
    <p class="error-desc">{{ T.notFound.desc }}</p>
    <div class="error-actions">
      <a routerLink="/home" class="btn-home">{{ T.notFound.btn }}</a>
      <a routerLink="/projects" class="btn-projects">{{ T.nav.projects }}</a>
    </div>
  </div>
</div>
