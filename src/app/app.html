<!-- Portfolio de Yanisse Kyliane Yao -->
<nav [class.nav-open]="isMenuOpen" role="navigation" aria-label="Navigation principale">
  <div class="nav-container">
    <a routerLink="/home" class="logo" (click)="closeMenu()">YK Yao</a>
    <ul class="nav-links" [class.menu-open]="isMenuOpen">
      <li><a routerLink="/home" routerLinkActive="router-link-active" (click)="closeMenu()">Accueil</a></li>
      <li><a routerLink="/about" routerLinkActive="router-link-active" (click)="closeMenu()">À propos</a></li>
      <li><a routerLink="/skills" routerLinkActive="router-link-active" (click)="closeMenu()">Compétences</a></li>
      <li><a routerLink="/projects" routerLinkActive="router-link-active" (click)="closeMenu()">Projets</a></li>
      <li><a routerLink="/contact" routerLinkActive="router-link-active" (click)="closeMenu()">Contact</a></li>
    </ul>
    <button class="theme-toggle" (click)="toggleTheme()" aria-label="Changer le thème">
      {{ isDark ? 'Mode clair' : 'Mode sombre' }}
    </button>
    <div class="menu-toggle" [class.active]="isMenuOpen" (click)="toggleMenu()" aria-label="Menu">
      <span class="hamburger-line"></span>
      <span class="hamburger-line"></span>
      <span class="hamburger-line"></span>
    </div>
  </div>
</nav>

<!-- Overlay pour fermer le menu en cliquant dehors -->
@if (isMenuOpen) {
  <div class="menu-overlay" (click)="closeMenu()"></div>
}

<!-- Main content -->
<main>
  <router-outlet></router-outlet>
</main>
