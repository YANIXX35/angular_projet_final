  <!-- Thème système au 1er chargement (avant Angular) -->
  <script>
    (function () {
      var saved = localStorage.getItem('theme');
      if (!saved) {
        var prefersDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
        if (!prefersDark) { document.documentElement.setAttribute('data-theme', 'light'); }
      } else if (saved === 'light') {
        document.documentElement.setAttribute('data-theme', 'light');
      }
    })();
  </script>
  <style>
    #ky-splash{position:fixed;inset:0;z-index:9999;display:flex;align-items:center;justify-content:center;flex-direction:column;gap:1.25rem;background:#0A0E1A;transition:opacity .7s ease}
    [data-theme="light"] #ky-splash{background:#F8FAFC}
    #ky-splash .ky{font-family:'Space Grotesk',sans-serif;font-size:clamp(5rem,16vw,10rem);font-weight:900;line-height:1;background:linear-gradient(135deg,#FF6B6B 30%,#8B2FC9);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
    #ky-splash .ky-name{color:#64748b;font-family:'Space Grotesk',sans-serif;font-size:clamp(0.75rem,2vw,1rem);letter-spacing:0.12em;text-transform:uppercase;margin:0}
    [data-theme="light"] #ky-splash .ky-name{color:#64748b}
    #ky-splash .ky-percent{font-family:'Space Grotesk',sans-serif;font-size:clamp(2rem,5vw,3rem);font-weight:700;color:#FF6B6B;letter-spacing:-0.02em;min-width:5ch;text-align:center}
    #ky-splash .ky-bar{width:180px;height:3px;background:rgba(255,255,255,.15);border-radius:99px;overflow:hidden}
    [data-theme="light"] #ky-splash .ky-bar{background:#e2e8f0}
    #ky-splash .ky-bar-fill{height:100%;width:0;background:#FF6B6B;border-radius:99px;animation:kyLoad 2s ease-in-out forwards}
    @keyframes kyLoad{from{width:0}to{width:100%}}
  </style>

      <script>var _p=0,_el=document.getElementById('ky-pct'),_iv=setInterval(function(){_p++;_el.textContent=_p+'%';if(_p>=100)clearInterval(_iv);},20);</script>
    </div>
